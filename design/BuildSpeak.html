<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BuildSpeak — hi-fi prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDEAE2; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #1A1A1A; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="BuildSpeak/design-canvas.jsx"></script>
<script type="text/babel" src="BuildSpeak/browser-window.jsx"></script>
<script type="text/babel" src="BuildSpeak/tokens.jsx"></script>
<script type="text/babel" src="BuildSpeak/home.jsx"></script>
<script type="text/babel" src="BuildSpeak/reader.jsx"></script>
<script type="text/babel" src="BuildSpeak/vocab.jsx"></script>
<script type="text/babel" src="BuildSpeak/profile.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "fontSize": 18,
  "lineHeight": 1.75
}/*EDITMODE-END*/;

function TweaksPanel({ visible, value, onChange, onClose }) {
  if (!visible) return null;
  const t = BS_THEMES[value.theme] || BS_THEMES.light;
  const cardBg = '#fff', fg = '#1A1A1A', mut = '#6B6B6B', brd = 'rgba(0,0,0,0.08)';
  return (
    <div style={{
      position: 'fixed', right: 24, bottom: 24, zIndex: 999,
      width: 280, padding: 16, borderRadius: 12,
      background: cardBg, color: fg,
      border: `1px solid ${brd}`,
      boxShadow: '0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08)',
      fontFamily: BS_FONTS.sans,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <div style={{ fontFamily: BS_FONTS.serif, fontSize: 15, fontWeight: 600 }}>Tweaks</div>
        <div style={{ flex: 1 }} />
        <button onClick={onClose} style={{
          width: 22, height: 22, borderRadius: 6, border: 'none', cursor: 'pointer',
          background: '#F3F2EC', color: mut, display: 'inline-flex',
          alignItems: 'center', justifyContent: 'center',
        }}>{BSIcons.x}</button>
      </div>

      <div style={{ fontSize: 10.5, letterSpacing: 1, color: mut, textTransform: 'uppercase', marginBottom: 6 }}>Theme</div>
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginBottom: 16,
      }}>
        {['light','dark','sepia'].map(k => {
          const th = BS_THEMES[k];
          const active = value.theme === k;
          return (
            <button key={k} onClick={() => onChange({ theme: k })} style={{
              padding: '8px 6px', borderRadius: 8, cursor: 'pointer',
              background: th.bg, color: th.fg,
              border: `1.5px solid ${active ? '#2F6FEB' : brd}`,
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              fontSize: 11, fontWeight: 600,
            }}>
              <div style={{ display: 'flex', gap: 3 }}>
                <div style={{ width: 14, height: 14, borderRadius: 3, background: th.fg }} />
                <div style={{ width: 14, height: 14, borderRadius: 3, background: th.accent }} />
                <div style={{ width: 14, height: 14, borderRadius: 3, background: th.highlight }} />
              </div>
              {th.name}
            </button>
          );
        })}
      </div>

      <div style={{ fontSize: 10.5, letterSpacing: 1, color: mut, textTransform: 'uppercase', marginBottom: 6, display: 'flex' }}>
        <span>Reader font size</span><span style={{ flex: 1 }} />
        <span style={{ fontFamily: BS_FONTS.mono, letterSpacing: 0, textTransform: 'none' }}>{value.fontSize}px</span>
      </div>
      <input type="range" min="15" max="22" step="1" value={value.fontSize}
        onChange={e => onChange({ fontSize: +e.target.value })}
        style={{ width: '100%', marginBottom: 14 }} />

      <div style={{ fontSize: 10.5, letterSpacing: 1, color: mut, textTransform: 'uppercase', marginBottom: 6, display: 'flex' }}>
        <span>Line height</span><span style={{ flex: 1 }} />
        <span style={{ fontFamily: BS_FONTS.mono, letterSpacing: 0, textTransform: 'none' }}>{value.lineHeight.toFixed(2)}</span>
      </div>
      <input type="range" min="1.4" max="2.0" step="0.05" value={value.lineHeight}
        onChange={e => onChange({ lineHeight: +e.target.value })}
        style={{ width: '100%', marginBottom: 8 }} />

      <div style={{ fontSize: 11, color: mut, lineHeight: 1.5, marginTop: 8 }}>
        Changes apply to all four artboards. Reader font & line-height affect the side-by-side passage.
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  const theme = BS_THEMES[tweaks.theme] || BS_THEMES.light;

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const applyEdits = (edits) => {
    const next = { ...tweaks, ...edits };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  // Artboard content — each wrapped in the browser chrome
  const ART_W = 1440, ART_H = 920;
  const CHROME_H = 84; // tab bar + toolbar
  const innerW = ART_W, innerH = ART_H - CHROME_H;

  const wrap = (child, url, tabTitle) => (
    <ChromeWindow width={ART_W} height={ART_H} url={url}
      tabs={[{ title: tabTitle }, { title: 'follow-builders' }, { title: 'Claude' }]}
      activeIndex={0}>
      <div style={{ width: innerW, height: innerH, overflow: 'auto', background: theme.bg }}>
        {child}
      </div>
    </ChromeWindow>
  );

  return (
    <div style={{ minHeight: '100vh' }}>
      <DesignCanvas>
        <DCSection id="digest" title="BuildSpeak"
          subtitle="Learn English from the people building AI — 4 MVP screens · SPEC v0.1">
          <DCArtboard id="home" label="01 · Home — daily digest" width={ART_W} height={ART_H}>
            {wrap(<BSHomeScreen theme={theme} />, 'buildspeak.app', 'BuildSpeak — Today')}
          </DCArtboard>

          <DCArtboard id="reader" label="02 · Reader — bilingual + word card + player" width={ART_W} height={ART_H}>
            {wrap(
              <BSReaderScreen theme={theme} fontSize={tweaks.fontSize} lineHeight={tweaks.lineHeight} />,
              'buildspeak.app/read/podcast/no-priors-ep118', 'The Agentic Economy — BuildSpeak')}
          </DCArtboard>

          <DCArtboard id="vocab" label="03 · Vocabulary — contextual notebook" width={ART_W} height={ART_H}>
            {wrap(<BSVocabScreen theme={theme} />, 'buildspeak.app/vocab', 'Vocabulary — BuildSpeak')}
          </DCArtboard>

          <DCArtboard id="profile" label="04 · Profile — streak + heatmap" width={ART_W} height={ART_H}>
            {wrap(<BSProfileScreen theme={theme} />, 'buildspeak.app/me', 'You — BuildSpeak')}
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel visible={editMode} value={tweaks} onChange={applyEdits} onClose={() => {
        setEditMode(false);
        window.parent.postMessage({ type: '__edit_mode_off' }, '*');
      }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
